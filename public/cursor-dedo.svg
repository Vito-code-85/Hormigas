<svg xmlns="http://www.w3.org/2000/svg" width="32" height="48" viewBox="0 0 32 48">
  <!-- Index finger pointing down, rest folded into fist -->
  <!-- Finger rendered first so fist sits on top at the junction -->
  <rect x="11" y="14" width="10" height="30" rx="5" fill="#F5C5A0" stroke="#8B4513" stroke-width="1.5"/>
  <!-- Fist (knuckles at top) covers the upper part of the finger -->
  <path d="M5,4 Q5,2 16,2 Q27,2 27,4 L27,20 Q27,23 22,23 L10,23 Q5,23 5,20 Z"
        fill="#F5C5A0" stroke="#8B4513" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Three knuckle bumps -->
  <ellipse cx="10" cy="3" rx="3.5" ry="2.5" fill="#F5C5A0" stroke="#8B4513" stroke-width="1.2"/>
  <ellipse cx="16" cy="2" rx="3.5" ry="2.5" fill="#F5C5A0" stroke="#8B4513" stroke-width="1.2"/>
  <ellipse cx="22" cy="3" rx="3.5" ry="2.5" fill="#F5C5A0" stroke="#8B4513" stroke-width="1.2"/>
  <!-- Thumb on left side -->
  <path d="M5,12 Q0,10 0,17 Q0,23 5,21" fill="#F5C5A0" stroke="#8B4513" stroke-width="1.2" fill-rule="nonzero"/>
  <!-- Knuckle creases on the pointing finger -->
  <path d="M12,27 Q16,25 20,27" stroke="#8B4513" stroke-width="0.9" fill="none" stroke-linecap="round"/>
  <path d="M12,34 Q16,32 20,34" stroke="#8B4513" stroke-width="0.8" fill="none" stroke-linecap="round"/>
</svg>
